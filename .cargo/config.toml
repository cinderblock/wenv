# no_std / no-CRT build: we link only OS DLLs (kernel32, shell32 on Windows),
# so there is no C runtime to statically link. The crate provides its own entry
# point (mainCRTStartup in src/sys/windows.rs) and global allocator, so the
# linker needs to be told the entry and subsystem explicitly.
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "link-arg=/ENTRY:mainCRTStartup",
    "-C", "link-arg=/SUBSYSTEM:CONSOLE",
]
